# tmux-window-sidebar configuration
# Source this file from .tmux.conf or let TPM handle it

# Sidebar width (default: 28 columns, or "25%" for percentage)
set -g @ws_width "28"

# Auto-create sidebar for new windows (default: on)
set -g @ws_auto_create "on"

# Toggle keybindings (default: e/E)
set -g @ws_key "e"
set -g @ws_key_all "E"

# Notification sounds (macOS)
set -g @agent-sound "Blow"
set -g @agent-ask-sound "NaviHey,NaviListen,NaviHello,NaviFairy,NaviWatchOut,NaviLook"

# Colors (matching Ghostty theme)
set -g @ws_color_bg "#020111"
set -g @ws_color_accent "#9CDFC5"
set -g @ws_color_text "#ffffff"
set -g @ws_color_dim "#6c7086"
set -g @ws_color_running "#9ece6a"
set -g @ws_color_waiting "#e0af68"
set -g @ws_color_idle "#7aa2f7"
set -g @ws_color_error "#f7768e"

# Keybindings
bind e run-shell -b "~/.local/bin/tmux-window-sidebar toggle"
bind E run-shell -b "~/.local/bin/tmux-window-sidebar toggle-all"

# Hooks for instant refresh
set-hook -g after-select-window 'run-shell -b "~/.local/bin/tmux-window-sidebar hook internal refresh"'
set-hook -g after-select-pane 'run-shell -b "~/.local/bin/tmux-window-sidebar hook internal refresh"'

# Auto-create sidebar for new windows
set-hook -g after-new-window 'run-shell -b "~/.local/bin/tmux-window-sidebar toggle"'