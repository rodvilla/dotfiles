# Ensure Homebrew binaries are available to run-shell scripts
set-environment -g PATH "/Users/rodrigo/.local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Temporary
set-option -g status-position bottom

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# New windows open in ~/Developer
bind c new-window -c "~/Developer"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# set the scrollback
set -g history-limit 200000

# force tmux to use utf-8
setw -gq utf8 on

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc:smcup@:rmcup@"

# Faster escape time (important for Vim users)
set -sg escape-time 0

# Focus events (important for Vim/Neovim auto-reload)
set -g focus-events on

# Fuzzy window/session switcher (prefix + f)
bind f display-popup -E -w 60% -h 60% "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse --prompt='switch> ' | cut -d' ' -f1 | xargs -r tmux switch-client -t"

# Quick popup terminal (prefix + g)
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Wrap the current agent pane with the coding layout and zoom it.
bind A run-shell -b "zsh ~/.dotfiles/shell/dev-tmux-layout.zsh attach '#{pane_id}' '#{pane_current_path}'"

# Vi copy mode
bind v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-fuzzback'
set -g @plugin 'tmux-plugins/tmux-better-mouse-mode'

# tmux-navigator: if-shell based detection (synchronous, more reliable)
bind -n M-Left if-shell "tmux capture-pane -p -t {left-of-pane} 2>/dev/null | grep -q 'nvim'" "send-keys C-h" "select-pane -L"
bind -n M-Right if-shell "tmux capture-pane -p -t {right-of-pane} 2>/dev/null | grep -q 'nvim'" "send-keys C-l" "select-pane -R"
bind -n M-Up if-shell "tmux capture-pane -p -t {up-of-pane} 2>/dev/null | grep -q 'nvim'" "send-keys C-k" "select-pane -U"
bind -n M-Down if-shell "tmux capture-pane -p -t {down-of-pane} 2>/dev/null | grep -q 'nvim'" "send-keys C-j" "select-pane -D"

# SessionX settings
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-bind 'o'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Agent notification sounds (macOS /System/Library/Sounds/ names, or "none")
set -g @agent-sound "Blow"
set -g @agent-ask-sound "NaviHey,NaviListen,NaviHello,NaviFairy,NaviWatchOut,NaviLook"

# Ghostty background: #020111 — match it so the bar appears to float
INACTIVE_PANE_BG="#020111"

# status bar theme
set -g status-style bg=default,fg=colour245
set -g message-command-style bg=colour238,fg=colour222
set -g message-style bg=colour238,fg=colour222

# Pane borders: match background to avoid visible gap
set -g pane-border-style fg=#020111,bg=default
set -g pane-active-border-style fg=colour154,bg=default

# Pane backgrounds: transparent so Ghostty blur/opacity effects show through
set -g window-style bg=default
set -g window-active-style bg=default

# Window status: dim inactive, bright active; agent hooks override per-window style
setw -g window-status-style fg=colour245,bg=default
setw -g window-status-current-style fg=#9CDFC5,bg=default
setw -g window-status-activity-style bg=default,fg=colour154

set -g status on
set -g status-justify centre
set -g status-right-length 100
set -g status-left-length 100
set -g status-right-style none
set -g status-left-style none

setw -g window-status-separator ' • '

# Left: floating rounded square with folder icon (Nerd Font)
set -g status-left ' #[bg=default,fg=#9CDFC5]#[bg=#9CDFC5,fg=#020111] 󰉋 #(basename "#{pane_current_path}") #[bg=default,fg=#9CDFC5] '

# Right: keep prefix highlight plugin
set -g status-right '#{prefix_highlight} '

# Window formats: clean, no padding arrows — colors come from window-status-style
setw -g window-status-format ' #W '
setw -g window-status-current-format ' #W#{?window_zoomed_flag, 󰊓,} '

# Start in window 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Clear agent status + refresh sidebar when switching windows
set-hook -g after-select-window 'run-shell -b "~/.local/bin/tmux-window-sidebar clear-status #{pane_id}"; run-shell -b "~/.local/bin/tmux-window-sidebar hook internal refresh"'
set-hook -g session-window-changed 'run-shell -b "~/.local/bin/tmux-window-sidebar clear-status #{pane_id}"'
# Refresh sidebar + sync status bar with zoom state
set-hook -g after-select-pane 'run-shell -b "~/.local/bin/tmux-window-sidebar hook internal refresh"; run-shell -b "~/.local/bin/tmux-window-sidebar sync-status"'
# Sync status bar on zoom/unzoom (layout change)
set-hook -g window-layout-changed 'run-shell -b "~/.local/bin/tmux-window-sidebar sync-status"'

# Click on sidebar cards to switch windows
# When mouse is on, intercept clicks in sidebar panes to switch windows;
# for all other panes, preserve default behavior (select + forward mouse event)
bind -n MouseDown1Pane if-shell "tmux display-message -t #{mouse_pane} -p '#{pane_current_command}' | grep -q tmux-window-sid" "run-shell -b '~/.local/bin/tmux-window-sidebar click #{mouse_pane} #{mouse_y}'" "select-pane -t = ; if-shell -F '#{pane_in_mode}' 'copy-mode -M' 'send-keys -M'"

# tmux-window-sidebar plugin
set -g @plugin 'tmux-plugins/tmux-window-sidebar'
set -g @ws_width "28"
set -g @ws_auto_create "on"
set -g @ws_key "e"
set -g @ws_key_all "E"

# Sidebar colors (matching Ghostty theme)
set -g @ws_color_bg "#020111"
set -g @ws_color_accent "#9CDFC5"
set -g @ws_color_text "#ffffff"
set -g @ws_color_dim "#6c7086"
set -g @ws_color_running "#9ece6a"
set -g @ws_color_waiting "#e0af68"
set -g @ws_color_idle "#7aa2f7"
set -g @ws_color_error "#f7768e"

# Sidebar toggle keybindings
bind e run-shell -b "~/.local/bin/tmux-window-sidebar toggle"
bind E run-shell -b "~/.local/bin/tmux-window-sidebar toggle-all"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
